agents:
  pi-olmx-qwen36:
    tool: pi
    command: pi
    model: olmx/Qwen3.6-35B-A3B-4bit
    args:
      - --print
      - --no-session
      - --model
      - "{model}"
      - "{prompt}"

  pi-go-ds4-flash:
    tool: pi
    command: pi
    model: opencode-go/deepseek-v4-flash
    args:
      - --print
      - --verbose
      - --model
      - "{model}"
      - "{prompt}"

scenarios:
  spec-plan:
    agent: pi-go-ds4-flash
    prd: ../PRD.md
    prompts:
      - /archetipo-spec
      - /archetipo-plan US-001

  spec:
    agent: pi-go-ds4-flash
    prd: ../PRD.md
    prompts:
      - /archetipo-spec