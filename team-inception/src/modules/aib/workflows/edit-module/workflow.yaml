# Edit Module - Module Editor Configuration
name: "edit-module"
description: "Edit existing AIRchetipo modules (structure, agents, workflows, documentation) while following all best practices"
author: "AIRchetipo"

# Critical variables load from config_source
config_source: "{project-root}/{air_folder}/aib/config.yaml"
communication_language: "{config_source}:communication_language"
user_name: "{config_source}:user_name"

# Required Data Files - Critical for understanding module conventions
module_structure_guide: "{project-root}/{air_folder}/aib/workflows/create-module/module-structure.md"

# Related workflow editors
agent_editor: "{project-root}/{air_folder}/aib/workflows/edit-agent/workflow.yaml"
workflow_editor: "{project-root}/{air_folder}/aib/workflows/edit-workflow/workflow.yaml"

# Optional docs that can be used to understand the target module
recommended_inputs:
  - target_module: "Path to the module directory to edit"
  - aim_module: "{project-root}/{air_folder}/aim/"
  - aib_module: "{project-root}/{air_folder}/aib/"
  - cis_module: "{project-root}/{air_folder}/cis/"
  - existing_agents: "{project-root}/{air_folder}/*/agents/"
  - existing_workflows: "{project-root}/{air_folder}/*/workflows/"

# Module path and component files
installed_path: "{project-root}/{air_folder}/aib/workflows/edit-module"
template: false # This is an action workflow - no template needed
instructions: "{installed_path}/instructions.md"
validation: "{installed_path}/checklist.md"

standalone: true

# Web bundle configuration
web_bundle: false # AIB workflows run locally in AIRchetipo project
