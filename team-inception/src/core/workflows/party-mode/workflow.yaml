# Party Mode - Multi-Agent Group Discussion Workflow with PRD Generation
name: "party-mode"
description: "Orchestrates group discussions between all installed AIRchetipo agents to collect product requirements and automatically generate a comprehensive PRD"
author: "AIRchetipo"

# Critical data sources - manifest and config overrides
agent_manifest: "{project-root}/{air_folder}/_cfg/agent-manifest.csv"
prd_checklist: "{project-root}/{air_folder}/core/workflows/party-mode/prd-checklist.md"
project_types: "{project-root}/{air_folder}/core/workflows/party-mode/project-types.csv"
domain_complexity: "{project-root}/{air_folder}/core/workflows/party-mode/domain-complexity.csv"

# Configuration
config_source: "{project-root}/{air_folder}/aim/config.yaml"
project_name: "{config_source}:project_name"
output_folder: "{config_source}:output_folder"
user_name: "{config_source}:user_name"
communication_language: "{config_source}:communication_language"
document_output_language: "{config_source}:document_output_language"
date: system-generated

# Templates for document generation
prd_template: "{project-root}/{air_folder}/core/workflows/party-mode/prd-template.md"
default_output_file: "{output_folder}/PRD.md"
backlog_template: "{project-root}/{air_folder}/core/workflows/party-mode/create-epics-and-stories/requirements-template.md"
backlog_output_file: "{output_folder}/requirements.md"

# Instructions
instructions: "{project-root}/{air_folder}/core/workflows/party-mode/instructions.md"

# Template settings for PRD output
template_settings:
  output_file: "{default_output_file}"
  update_mode: overwrite

# Exit conditions
exit_triggers:
  - "*exit"

standalone: true

web_bundle:
  name: "party-mode"
  description: "Orchestrates group discussions between all installed AIRchetipo agents to collect product requirements and automatically generate a comprehensive PRD"
  author: "AIRchetipo"
  template: "air/core/workflows/party-mode/prd-template.md"
  instructions: "air/core/workflows/party-mode/instructions.md"
  agent_manifest: "air/_cfg/agent-manifest.csv"
  prd_checklist: "air/core/workflows/party-mode/prd-checklist.md"
  project_types: "air/core/workflows/party-mode/project-types.csv"
  domain_complexity: "air/core/workflows/party-mode/domain-complexity.csv"
  backlog_template: "air/core/workflows/party-mode/requirements-template.md"
  web_bundle_files:
    - "{air_folder}/core/workflows/party-mode/instructions.md"
    - "{air_folder}/core/workflows/party-mode/prd-template.md"
    - "{air_folder}/core/workflows/party-mode/prd-checklist.md"
    - "{air_folder}/core/workflows/party-mode/project-types.csv"
    - "{air_folder}/core/workflows/party-mode/domain-complexity.csv"
    - "{air_folder}/core/workflows/party-mode/requirements-template.md"
