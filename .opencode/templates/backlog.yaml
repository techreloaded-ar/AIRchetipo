# OpenCode Backlog (single file)
# Human-readable YAML. Keep IDs unique and states consistent.
# Edit only this file; do not create additional backlog files.
#
# Quick reference
# - IDs: EP-### (epics), US-### (stories), TK-### (tasks)
# - States: epic [proposed|in_progress|done|cancelled]
#           story [draft|ready|in_progress|in_review|done|cancelled]
#           task  [todo|doing|blocked|review|done]
# - INVEST: ensure each story is Independent, Negotiable, Valuable, Estimable, Small, Testable
# - Gherkin: at least 3 scenarios per story (happy path, validation error, edge)
#
# How to use
# 1) Increment counters when creating new items
# 2) Link stories to epics via epicId; tasks live inside their story
# 3) Keep acceptance criteria succinct and testable
# 4) Record changes under history with timestamp and author

version: 1
counters:
  epic: 0
  story: 0
  task: 0

# List of epics
epics: []

# List of stories (each with embedded tasks)
stories: []

